<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <meta name="robots" content="noindex,nofollow" />
    <title>Open LOOK5</title>
    <style>
      body {
        color: #111;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        margin: 0;
        padding: 32px 20px;
      }

      main {
        margin: 0 auto;
        max-width: 520px;
      }

      a.button {
        background: #111;
        color: #fff;
        display: inline-block;
        margin-top: 16px;
        padding: 12px 16px;
        text-decoration: none;
      }

      .muted {
        color: #555;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Open LOOK5</h1>
      <p>
        We’re opening LOOK5 so you can finish resetting your
        password.
      </p>
      <p>
        <a class="button" id="open-app" href="look5app://auth/reset-password">
          Open LOOK5
        </a>
      </p>
      <p class="muted">
        If LOOK5 does not open automatically, tap the button above.
        Use only the newest password reset email.
      </p>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const tokenHash = params.get("token_hash");
      const type = params.get("type") || "recovery";
      const appParams = new URLSearchParams();

      if (tokenHash) {
        appParams.set("token_hash", tokenHash);
      }

      appParams.set("type", type);

      const appUrl = `look5app://auth/reset-password?${appParams.toString()}`;
      const openAppLink = document.getElementById("open-app");

      openAppLink.setAttribute("href", appUrl);

      if (tokenHash) {
        window.location.href = appUrl;
      }
    </script>
  </body>
</html>
